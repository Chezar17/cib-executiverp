<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSOTF-OPORD-001 // OPERATION IRON TIDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --panel:#111213; --panel-2:#161718; --line:#2a2b2c;
    --red:#c31f2a; --red-dim:#7a1319; --amber:#c9a04a; --text:#dcdcdc; --muted:#8b8d8f; --green:#5fae6b;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:'IBM Plex Mono', monospace; line-height:1.6; overflow-x:hidden; }
  h1,h2,h3,h4{ font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:.04em; margin:0; }
  a{color:var(--red);}
  .scanlines{ pointer-events:none; position:fixed; inset:0; z-index:9999;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:overlay; }
  .scanline-sweep{ pointer-events:none; position:fixed; left:0; right:0; height:120px; z-index:9998;
    background:linear-gradient(to bottom, transparent, rgba(195,31,42,0.05), transparent); animation:sweep 7s linear infinite; }
  @keyframes sweep{ 0%{top:-120px;} 100%{top:100vh;} }
  @media (prefers-reduced-motion: reduce){ .scanline-sweep{animation:none; display:none;} }

  .classbar{ position:sticky; top:0; z-index:500; background:var(--red); color:#0a0a0a; font-family:'Oswald', sans-serif;
    font-weight:700; letter-spacing:.1em; font-size:12px; padding:6px 10px; animation:flicker 6s infinite;
    display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap; text-align:center; }
  @keyframes flicker{ 0%,93%,100%{opacity:1;} 94%{opacity:.7;} 95%{opacity:1;} 96%{opacity:.6;} 97%{opacity:1;} }

  .lang-toggle{
    position:fixed; top:38px; right:14px; z-index:600;
    background:#0a0a0a; border:1px solid var(--red); border-radius:2px;
    display:flex; overflow:hidden; font-family:'Oswald',sans-serif; font-size:11px; letter-spacing:.1em;
  }
  .lang-toggle button{
    background:transparent; border:none; color:var(--muted); padding:8px 12px; cursor:pointer;
    font-family:inherit; font-size:inherit; letter-spacing:inherit; transition:background .2s, color .2s;
  }
  .lang-toggle button.active{ background:var(--red); color:#0a0a0a; font-weight:700; }
  .lang-toggle button:not(.active):hover{ color:#fff; }
  @media (max-width:640px){ .lang-toggle{ top:auto; bottom:14px; right:14px; } }

  nav{ position:sticky; top:26px; z-index:400; background:rgba(10,10,10,0.94); backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line); display:flex; overflow-x:auto; scrollbar-width:none; }
  nav::-webkit-scrollbar{display:none;}
  nav a{ color:var(--muted); text-decoration:none; font-size:11px; letter-spacing:.08em; text-transform:uppercase;
    padding:12px 14px; white-space:nowrap; border-right:1px solid var(--line); transition:color .2s, background .2s; }
  nav a:hover{ color:var(--red); background:var(--panel); }

  .hero{ position:relative; padding:90px 24px 70px; text-align:center; border-bottom:1px solid var(--line);
    background:radial-gradient(ellipse at 50% -10%, rgba(195,31,42,0.12), transparent 60%), var(--bg); overflow:hidden; }
  .hero::before{ content:""; position:absolute; inset:0;
    background-image:linear-gradient(rgba(195,31,42,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(195,31,42,0.05) 1px, transparent 1px);
    background-size:38px 38px; mask-image:radial-gradient(ellipse at 50% 20%, black 30%, transparent 75%); }
  .hero-content{position:relative; z-index:2;}
  .doc-number{ color:var(--amber); font-size:12px; letter-spacing:.25em; margin-bottom:18px; }
  .stamp{ display:inline-block; border:3px solid var(--red); color:var(--red); font-family:'Oswald', sans-serif; font-weight:700;
    font-size:14px; letter-spacing:.3em; padding:6px 18px; transform:rotate(-4deg) scale(2.2); opacity:0;
    animation:stampDown .5s cubic-bezier(.2,.9,.3,1.3) .3s forwards; }
  @keyframes stampDown{ 0%{opacity:0; transform:rotate(-4deg) scale(2.6); filter:blur(2px);} 60%{opacity:1;}
    100%{opacity:.92; transform:rotate(-4deg) scale(1); filter:blur(0);} }
  .hero h1{ font-size:clamp(34px, 6vw, 68px); margin:26px 0 8px; color:#fff; text-shadow:0 0 30px rgba(195,31,42,0.35); }
  .hero h1 span{ color:var(--red); }
  .hero .subtitle{ color:var(--muted); font-size:14px; letter-spacing:.15em; margin-bottom:30px; }
  .meta-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:1px; max-width:900px;
    margin:36px auto 0; background:var(--line); border:1px solid var(--line); text-align:left; }
  .meta-cell{ background:var(--panel); padding:14px 18px; }
  .meta-cell .k{ font-size:10px; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; }
  .meta-cell .v{ font-size:13px; color:var(--text); margin-top:4px; }

  section.block{ max-width:980px; margin:0 auto; padding:70px 24px; border-bottom:1px solid var(--line);
    opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease; }
  section.block.in{ opacity:1; transform:translateY(0); }
  .eyebrow{ color:var(--red); font-size:11px; letter-spacing:.25em; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:10px; }
  .eyebrow::before{ content:""; width:24px; height:1px; background:var(--red); }
  h2.title{ font-size:clamp(24px,3.4vw,36px); color:#fff; margin-bottom:26px; }
  h3.subtitle2{ margin-top:50px; color:#fff; font-size:16px; letter-spacing:.06em; }
  p{ color:var(--text); font-size:14.5px; }
  .lede{ color:var(--muted); font-size:15px; max-width:760px; margin-bottom:30px; }

  ul.tac-list{ list-style:none; padding:0; margin:0; display:grid; gap:0; }
  ul.tac-list li{ padding:10px 0 10px 22px; border-bottom:1px dashed var(--line); position:relative; font-size:14px; color:var(--text); }
  ul.tac-list li::before{ content:"▸"; position:absolute; left:0; color:var(--red); }
  ul.tac-list.compact li{ font-size:13px; padding:7px 0 7px 20px; }

  .two-col{ display:grid; grid-template-columns:1fr 1fr; gap:40px; }
  .three-col{ display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
  @media (max-width:720px){ .two-col, .three-col{ grid-template-columns:1fr; } }

  .card{ background:var(--panel); border:1px solid var(--line); padding:22px; }
  .card h3{ font-size:14px; color:var(--amber); letter-spacing:.08em; margin-bottom:10px; }

  .obj-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:14px; margin-top:20px; }
  .obj-card{ background:var(--panel); border:1px solid var(--line); border-left:3px solid var(--red); padding:18px; transition:transform .2s, border-color .2s, background .2s; }
  .obj-card:hover{ transform:translateY(-3px); border-color:var(--red); background:var(--panel-2); }
  .obj-card .code{ color:var(--red); font-size:11px; letter-spacing:.2em; margin-bottom:8px; }
  .obj-card p{ font-size:13.5px; margin:0; color:var(--text); }

  .redact{ background:#1a1a1a; border:1px solid var(--red-dim); padding:20px 22px; margin:24px 0; position:relative; }
  .redact .rlabel{ color:var(--red); font-size:11px; letter-spacing:.2em; text-transform:uppercase; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
  .redact .rlabel::before{ content:"●"; animation:blink 1.4s infinite; }
  @keyframes blink{ 50%{opacity:.2;} }
  .bar{ display:inline-block; background:#111; color:transparent; cursor:pointer; user-select:none; padding:0 4px; border-radius:2px; transition:color .25s, background .25s; }
  .bar.revealed{ background:transparent; color:var(--text); }
  .redact .hint{ margin-top:12px; font-size:11px; color:var(--muted); letter-spacing:.05em; }

  .mission-box{ background:#000; border:1px solid var(--line); padding:26px 24px; font-size:14px; color:var(--green); position:relative; min-height:150px; }
  .mission-box .prompt{ display:block; color:var(--muted); font-size:11px; margin-bottom:14px; }
  #typewriter::after{ content:"▌"; animation:blink 1s step-start infinite; color:var(--green); }

  .phase-track{ position:relative; margin-top:40px; padding-left:34px; }
  .phase-track::before{ content:""; position:absolute; left:9px; top:6px; bottom:6px; width:2px; background:linear-gradient(to bottom, var(--red), var(--red-dim), transparent); }
  .phase{ position:relative; padding-bottom:36px; }
  .phase:last-child{ padding-bottom:0; }
  .phase::before{ content:""; position:absolute; left:-34px; top:2px; width:18px; height:18px; border-radius:50%; background:var(--bg); border:2px solid var(--red); }
  .phase .pnum{ color:var(--red); font-size:11px; letter-spacing:.2em; margin-bottom:4px; }
  .phase h4{ font-size:18px; color:#fff; margin-bottom:8px; }
  .phase p{ color:var(--muted); font-size:13.5px; margin:0 0 10px; }
  .phase ul.tac-list li{ font-size:13px; padding:6px 0 6px 20px; }

  .role-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; margin-top:24px; }
  .role-card{ background:var(--panel); border:1px solid var(--line); padding:18px; }
  .role-card h3{ color:#fff; font-size:14px; margin-bottom:10px; border-bottom:1px solid var(--line); padding-bottom:8px;}
  .role-card ul{ margin:0; padding-left:16px; color:var(--muted); font-size:12.5px; }
  .role-card ul li{ margin-bottom:4px; }

  .pir-list{ display:grid; gap:1px; background:var(--line); border:1px solid var(--line); margin-top:20px; }
  .pir-row{ background:var(--panel); display:grid; grid-template-columns:90px 1fr; }
  .pir-row .id{ background:var(--red-dim); color:#fff; font-size:12px; display:flex; align-items:center; justify-content:center; letter-spacing:.1em;}
  .pir-row .txt{ padding:12px 16px; font-size:13.5px; color:var(--text); }

  .accordion{ margin-top:24px; border-top:1px solid var(--line); }
  .acc-item{ border-bottom:1px solid var(--line); }
  .acc-head{ display:flex; justify-content:space-between; align-items:center; padding:16px 4px; cursor:pointer;
    font-family:'Oswald', sans-serif; letter-spacing:.06em; color:#fff; font-size:15px; gap:12px; }
  .acc-head .tag{ color:var(--red); font-size:11px; margin-right:12px; letter-spacing:.15em; flex-shrink:0; }
  .acc-head .chev{ color:var(--muted); transition:transform .25s; font-size:12px; flex-shrink:0; }
  .acc-item.open .chev{ transform:rotate(45deg); color:var(--red); }
  .acc-body{ max-height:0; overflow:hidden; transition:max-height .4s ease; font-size:13.5px; color:var(--muted); }
  .acc-item.open .acc-body{ max-height:500px; }
  .acc-body-inner{ padding:0 4px 20px; }
  .acc-body-inner b{ color:var(--text); }
  .acc-body-inner ul{ margin:10px 0 0; padding-left:18px; }
  .acc-body-inner ul li{ margin-bottom:4px; }

  .annex-accordion .acc-body-inner ul{ columns:2; -webkit-columns:2; }
  @media (max-width:640px){ .annex-accordion .acc-body-inner ul{ columns:1; } }

  .certification{ max-width:980px; margin:0 auto; padding:70px 24px 100px; }
  .sig-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:30px; margin-top:40px; }
  .sig{ border-top:1px solid var(--line); padding-top:14px; }
  .sig .name{ color:#fff; font-size:14px; }
  .sig .title{ color:var(--muted); font-size:11px; margin-top:2px; }
  .sig .line{ margin-top:26px; border-top:1px dashed var(--muted); padding-top:6px; font-size:10px; color:var(--muted); letter-spacing:.1em; }
  .quote-block{ text-align:center; margin:60px auto 0; max-width:600px; color:var(--amber); font-style:italic; font-size:15px; }
  .quote-block .en{ color:var(--muted); font-size:12px; margin-top:8px; font-style:normal; }
  footer{ text-align:center; padding:30px; color:var(--muted); font-size:11px; border-top:1px solid var(--line); letter-spacing:.08em; }

  table.doc-table{ width:100%; border-collapse:collapse; margin-top:20px; font-size:13px; }
  table.doc-table td, table.doc-table th{ border:1px solid var(--line); padding:10px 14px; text-align:left; }
  table.doc-table th{ background:var(--panel); color:var(--amber); font-family:'Oswald',sans-serif; letter-spacing:.08em; text-transform:uppercase; font-size:11px; }
  table.doc-table td.k{ color:var(--muted); width:220px; }
  table.doc-table td.v{ color:var(--text); }

  .callsign-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:1px; background:var(--line); border:1px solid var(--line); margin-top:16px;}
  .callsign-cell{ background:var(--panel); padding:12px 14px; }
  .callsign-cell .role{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .callsign-cell .sign{ font-size:15px; color:var(--red); font-family:'Oswald',sans-serif; letter-spacing:.06em; margin-top:4px; }

  ::selection{ background:var(--red); color:#000; }
</style>
</head>

function attachRedactionHandlers(){
  document.querySelectorAll('.bar').forEach(bar=>{
    bar.addEventListener('click', ()=>{
      if(!bar.classList.contains('revealed')){
        bar.textContent = bar.dataset.text;
        bar.classList.add('revealed');
      } else {
        bar.classList.remove('revealed');
        bar.textContent = '█'.repeat(Math.max(6, Math.round(bar.dataset.text.length/1.6)));
      }
    });
  });
}

function setupTypewriter(text){
  const twEl = document.getElementById('typewriter');
  let twIndex = 0;
  function typeStep(){
    if(twIndex <= text.length){
      twEl.textContent = text.slice(0, twIndex);
      twIndex++;
      requestAnimationFrame(()=>setTimeout(typeStep, 12));
    }
  }
  const box = document.querySelector('.mission-box');
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting && !typewriterStarted){
        typewriterStarted = true;
        typeStep();
        obs.disconnect();
      }
    });
  }, {threshold:0.4});
  obs.observe(box);
}

function attachRevealObserver(){
  const blocks = document.querySelectorAll('section.block, section.certification');
  const revealObs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); } });
  }, {threshold:0.06});
  blocks.forEach(b=>{ b.classList.remove('in'); revealObs.observe(b); });
}

function render(lang){
  currentLang = lang;
  const c = CONTENT[lang];
  document.getElementById('htmlRoot').lang = lang;
  document.getElementById('classbar').textContent = c.classbar;
  renderNav(c);
  renderHero(c);
  renderDocControl(c);
  renderSituation(c);
  renderMission(c);
  renderExecution(c);
  renderAdmin(c);
  renderCommand(c);
  renderIntel(c);
  renderBranch(c);
  renderTermination(c);
  renderAnnex(c);
  renderCert(c);
  document.getElementById('footerSection').textContent = c.footer;
  document.getElementById('btnEN').classList.toggle('active', lang==='en');
  document.getElementById('btnID').classList.toggle('active', lang==='id');
  attachRevealObserver();
}

document.getElementById('btnEN').addEventListener('click', ()=>render('en'));
document.getElementById('btnID').addEventListener('click', ()=>render('id'));

render('en');
</script>
